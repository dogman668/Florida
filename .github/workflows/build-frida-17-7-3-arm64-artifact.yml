name: Build Florida 17.7.3 Android arm64 Artifact

on:
  workflow_dispatch:
    inputs:
      frida_version:
        description: Frida tag/version to build
        required: true
        default: "17.7.3"
      android_arch:
        description: Frida Android host arch
        required: true
        default: "android-arm64"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          local-cache: false
          link-to-sdk: true

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y \
            build-essential tree ninja-build gcc-multilib g++-multilib \
            lib32stdc++-9-dev flex bison ruby ruby-dev python3-requests \
            python3-setuptools python3-dev python3-pip libc6-dev libc6-dev-i386 \
            xz-utils
          sudo gem install fpm -v 1.11.0 --no-document
          python3 -m pip install lief graphlib

      - name: Clone Frida and apply Florida patches
        shell: bash
        env:
          FRIDA_VERSION: ${{ inputs.frida_version }}
        run: |
          set -euxo pipefail
          export ANDROID_NDK_ROOT="${{ steps.setup-ndk.outputs.ndk-path }}"
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"

          git config --global user.name "GitHub Actions"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git clone --recurse-submodules --branch "$FRIDA_VERSION" https://github.com/frida/frida frida

          cd frida
          for path in ../patches/*; do
            name="$(basename "$path")"
            real="$(realpath "$path")"
            echo "Apply patches in $real to frida/subprojects/$name"
            cd "subprojects/$name"
            git am "../../../patches/$name/"*.patch
            cd ../..
          done

      - name: Build Android arm64 server
        shell: bash
        env:
          ARCH: ${{ inputs.android_arch }}
        run: |
          set -euxo pipefail
          export ANDROID_NDK_ROOT="${{ steps.setup-ndk.outputs.ndk-path }}"
          mkdir "build-$ARCH"
          cd "build-$ARCH"
          ../frida/configure --host="$ARCH"
          make

      - name: Package artifact
        shell: bash
        env:
          FRIDA_VERSION: ${{ inputs.frida_version }}
          ARCH: ${{ inputs.android_arch }}
        run: |
          set -euxo pipefail
          mkdir -p artifacts
          cp "build-$ARCH/subprojects/frida-core/server/frida-server" "artifacts/florida-server-$FRIDA_VERSION-$ARCH"
          chmod 0755 "artifacts/florida-server-$FRIDA_VERSION-$ARCH"
          gzip -k "artifacts/florida-server-$FRIDA_VERSION-$ARCH"
          sha256sum artifacts/* | tee artifacts/SHA256SUMS.txt
          file artifacts/* || true
          ls -lh artifacts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: florida-server-${{ inputs.frida_version }}-${{ inputs.android_arch }}
          path: artifacts/*
